name: Documentation Issue
description: Give us feedback on the documentation
title: "[docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to give us feedback!
  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: Which page or section is affected?
      placeholder: e.g. https://kapitan.dev/pages/core_concepts/
  - type: textarea
    id: documentation-issue-description
    attributes:
      label: Description of the documentation issue
      description: |
        A clear and concise description of what the issue with documentation is.
        Please make proposals for how it could be done better.
      placeholder: Tell us what you want to see in the project!
    validations:
      required: true
  - type: textarea
    id: suggested-improvement
    attributes:
      label: Suggested improvement
      description: |
        If you have a specific suggestion (new wording, example, diagram, etc.), share it here.
      placeholder: "It would be clearer if ..."
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        Add any other context about the documentation here.
      placeholder: Anything that might help us understand your documentation request...
