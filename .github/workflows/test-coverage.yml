---
name: Test Coverage and Analysis
run-name: Test Coverage for ${{ github.actor }} on branch ${{ github.ref_name }}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
      - test/*
      - alessandro/migrate-to-pytest
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'

  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'

jobs:
  test-coverage:
    name: Test Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install --with test --no-root --extras=gojsonnet --extras=omegaconf --extras=reclass-rs
          poetry run pip install pytest-json-report

      - name: Install system dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y gnupg2 git curl xz-utils jq
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          CUE_VERSION=$(curl -s "https://api.github.com/repos/cue-lang/cue/releases/latest" | jq -r '.tag_name')
          curl -L "https://github.com/cue-lang/cue/releases/download/${CUE_VERSION}/cue_${CUE_VERSION}_linux_amd64.tar.gz" | \
            sudo tar xz -C /usr/local/bin cue

      - name: Run tests with coverage
        run: |
          poetry run pytest tests/ \
            --cov=kapitan \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --junit-xml=junit.xml \
            --json-report \
            --json-report-file=test-results.json \
            --durations=20 \
            -v

      - name: Generate coverage report summary
        if: always()
        run: |
          {
            echo "## Coverage Report (Python ${{ matrix.python-version }})"
            echo ""

            # Extract coverage percentage from JSON
            if [ -f coverage.json ]; then
              COVERAGE=$(python -c "import json; data = json.load(open('coverage.json')); print(f\"{data['totals']['percent_covered']:.2f}\")")
              echo "### Overall Coverage: ${COVERAGE}%"
              echo ""

              # Add coverage badge color logic
              if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
                BADGE_COLOR="green"
              elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
                BADGE_COLOR="yellow"
              else
                BADGE_COLOR="red"
              fi
              echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${BADGE_COLOR})"
            fi

            # Add top uncovered files
            echo ""
            echo "### Coverage Details"
            echo '```'
            poetry run coverage report --skip-covered --skip-empty | head -30
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
            htmlcov/
            junit.xml
            test-results.json

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (Python ${{ matrix.python-version }})
          path: junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Parse test results
        if: always()
        run: |
          if [ -f test-results.json ]; then
            {
              echo "### Test Results Summary"
              echo ""

              python -c "
              import json
              data = json.load(open('test-results.json'))
              summary = data['summary']
              print(f\"✅ Passed: {summary.get('passed', 0)}\")
              print(f\"❌ Failed: {summary.get('failed', 0)}\")
              print(f\"⏭️ Skipped: {summary.get('skipped', 0)}\")
              print(f\"⏱️ Total Duration: {summary.get('duration', 0):.2f}s\")
              "

              echo ""
              echo "### Slowest Tests"
              echo '```'

              python -c "
              import json
              data = json.load(open('test-results.json'))
              tests = sorted(data['tests'], key=lambda x: x.get('duration', 0), reverse=True)[:10]
              for test in tests:
                  name = test['nodeid'].split('::')[-1][:60]
                  duration = test.get('duration', 0)
                  print(f\"{duration:8.3f}s - {name}\")
              " || echo "No test timing data available"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  test-parallel:
    name: Parallel Test Execution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install --with test --no-root --extras=gojsonnet --extras=omegaconf --extras=reclass-rs

      - name: Install system dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y gnupg2 git curl xz-utils jq
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          CUE_VERSION=$(curl -s "https://api.github.com/repos/cue-lang/cue/releases/latest" | jq -r '.tag_name')
          curl -L "https://github.com/cue-lang/cue/releases/download/${CUE_VERSION}/cue_${CUE_VERSION}_linux_amd64.tar.gz" | \
            sudo tar xz -C /usr/local/bin cue

      - name: Run tests in parallel
        run: |
          # Get CPU count
          CPU_COUNT=$(nproc)

          # Time the parallel execution
          START_TIME=$(date +%s)

          poetry run pytest tests/ -n auto --durations=10 -q --tb=short > parallel_output.txt 2>&1
          EXIT_CODE=$?

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          {
            echo "### Parallel Test Execution"
            echo ""
            echo "Running tests with $CPU_COUNT parallel workers"
            echo ""
            echo "⏱️ Parallel execution time: ${DURATION}s"
            echo ""
            # Show output
            echo "<details><summary>Parallel Test Output</summary>"
            echo ""
            echo '```'
            tail -50 parallel_output.txt
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$EXIT_CODE"

  coverage-comment:
    name: Post Coverage Comment
    if: github.event_name == 'pull_request'
    needs: [test-coverage]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports-3.12

      - name: Coverage Comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: warning
          VERBOSE: true

  test-matrix-summary:
    name: Test Matrix Summary
    if: always()
    needs: [test-coverage, test-parallel]
    runs-on: ubuntu-latest

    steps:
      - name: Create summary
        run: |
          {
            echo "# 📊 Test Execution Summary"
            echo ""
            echo "## Matrix Test Status"
            echo ""
            echo "| Python Version | Status |"
            echo "|----------------|--------|"
            echo "| 3.10 | ${{ needs.test-coverage.result == 'success' && '✅' || '❌' }} |"
            echo "| 3.11 | ${{ needs.test-coverage.result == 'success' && '✅' || '❌' }} |"
            echo "| 3.12 | ${{ needs.test-coverage.result == 'success' && '✅' || '❌' }} |"
            echo "| Parallel Tests | ${{ needs.test-parallel.result == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "**Workflow Status:** ${{ needs.test-coverage.result == 'success' && needs.test-parallel.result == 'success' && '✅ All tests passed' || '❌ Some tests failed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
