---
name: Publish Python Package to PyPI

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for softprops/action-gh-release to upload SBOM + checksum
      # assets to the GitHub release page. Only actually used when the
      # "Upload release artifacts" step runs (release events only).
      contents: write
      # NOTE:
      # Remove user/password and uncomment id-token permission once Trusted
      # Publishing (OIDC) is setup in pypi. See:
      # https://github.com/pypa/gh-action-pypi-publish
      # id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Build and check
        run: |
          uv build
          uvx twine check dist/*
      - name: Extract version
        id: version
        run: |
          # On release events, use the tag name (stripping any leading 'v').
          # On workflow_dispatch, fall back to parsing the built wheel filename
          # (kapitan is not installed in the runner Python after `uv build`).
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(python3 -c "import glob, re, sys; m=re.search(r'kapitan-([^-]+)-', glob.glob('dist/kapitan-*.whl')[0]); print(m.group(1)) if m else sys.exit('no wheel found')")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"
      - name: Generate SBOM
        timeout-minutes: 10
        run: |
          scripts/generate_sbom.sh "${{ steps.version.outputs.version }}" dist
      - name: Generate SHA256 checksums
        timeout-minutes: 5
        run: |
          scripts/generate_checksums.sh dist dist/SHA256SUMS
      - name: Validate checksums
        timeout-minutes: 5
        run: |
          (cd dist && sha256sum -c SHA256SUMS)
      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            dist/kapitan-*.whl
            dist/kapitan-*.tar.gz
            dist/kapitan-${{ steps.version.outputs.version }}.python.sbom.cdx.json
            dist/SHA256SUMS
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
