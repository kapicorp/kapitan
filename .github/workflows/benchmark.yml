---
name: Benchmark

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      benchmark: ${{ steps.filter.outputs.benchmark }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check changed paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: .github/filters/filters.yml

  benchmark:
    name: Performance Benchmark
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.benchmark == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true

      - name: Sync dependencies
        run: mise exec -- uv sync --locked --all-extras --dev

      - name: Run benchmarks
        id: benchmark
        run: |
          mise exec -- uv run pytest tests/test_compile_performance.py \
            -v --no-cov -p no:xdist -m benchmark \
            --benchmark-warmup=on \
            --benchmark-json=benchmark-result.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-results
          path: benchmark-result.json

      - name: Generate benchmark summary
        run: python3 scripts/generate_benchmark_summary.py benchmark-result.json

      - name: Run profiling (serial)
        env:
          KAPITAN_BENCHMARK_PROFILE_DIR: ${{ github.workspace }}/kapitan-profiles
        run: |
          mise exec -- uv run pytest tests/test_compile_performance.py \
            -v --no-cov -p no:xdist \
            -k test_compile_performance_with_profiling

      - name: Generate profiling summary
        env:
          KAPITAN_BENCHMARK_PROFILE_DIR: ${{ github.workspace }}/kapitan-profiles
        run: python3 scripts/generate_profiling_summary.py "$KAPITAN_BENCHMARK_PROFILE_DIR"

      - name: Upload profiling reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kapitan-profiles
          path: ${{ github.workspace }}/kapitan-profiles/
          if-no-files-found: warn

      - name: Clean working tree for gh-pages checkout
        run: git reset --hard

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: "pytest"
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "150%"
          fail-on-alert: false
          comment-on-alert: true
